GlobalParameters:
  KeepBuildTmp: True
  AsmDebug: True
jobs:
    -
        kernel_include_regex: "backward_codegen"
        kernel_exclude_regex:
        kernel_iteration_range: "[20, [21-21]]"
        output_file: out
        output_directory: bwd5_perf_hip
        output_format: [json, csv, otf2, pftrace]
        truncate_kernels: true
        sys_trace: true # enable for pftrace and otf2
        advanced_thread_trace: true # enable for att and ui folder
        att_target_cu: 1
        att_shader_engine_mask: "0xf" # collect one CU from 4 SEs
        att_simd_select: "0xf" # col+lect 4 SIMDs on single CU
        att_buffer_size: "0x6000000"
